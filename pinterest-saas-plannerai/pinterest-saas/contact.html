<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - YouPlanAI</title>
    <script src="https://tailwindcss.com"></script>
</head>
<body class="bg-[#0b0c10] text-[#c5c6c7] font-sans">
    <div class="max-w-2xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-indigo-500 text-center mb-4">Contact Support</h1>
        <p class="text-center text-gray-400 mb-12">Have a business inquiry, technical issue, or feedback? Drop us a message below.</p>
        
        <form action="#" method="POST" class="space-y-6 mt-8">
            <div>
                <label class="block text-sm font-semibold text-white mb-2">Email Address</label>
                <input type="email" required class="w-full bg-[#1f2833] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-white mb-2">Subject</label>
                <input type="text" required class="w-full bg-[#1f2833] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-sm font-semibold text-white mb-2">Message</label>
                <textarea rows="5" required class="w-full bg-[#1f2833] border border-gray-700 rounded-lg px-4 py-3 text-white focus:outline-none focus:border-purple-500"></textarea>
            </div>
            <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white font-bold py-3 rounded-lg hover:opacity-90 transition">Send Message</button>
        </form>
    </div>
</body>
</html>
